services:
  - type: web
    name: holobox-manager-tlc-supabase
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_STATE_TABLE
        value: holobox_state
      - key: SUPABASE_BUCKET
        value: holobox-media
